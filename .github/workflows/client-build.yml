name: 🏗️ Build Client

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "package.json"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "package.json"

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Run Build
        run: npm run build
